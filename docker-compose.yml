services:

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - churn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  churn-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app/src
    networks:
      - churn-network
    depends_on:
      mlflow:
        condition: service_healthy

  churn-streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: churn-streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/src
    networks:
      - churn-network
    depends_on:
      - churn-api

networks:
  churn-network:
    driver: bridge

volumes:
  mlflow_data: